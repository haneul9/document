<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>성유나 2048</title>
<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}

body {
  background: #faf8ef;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 14px 12px 28px;
}

/* ── 헤더 ── */
.header {
  width: 100%; max-width: 420px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}

h1 { font-size: 2.4rem; font-weight: 900; color: #776e65; line-height: 1; }

.score-area { display: flex; gap: 8px; }

.sbox {
  background: #bbada0; border-radius: 8px;
  padding: 6px 12px; text-align: center; min-width: 68px;
}
.sbox .lbl { font-size: 0.58rem; color: #eee4da; letter-spacing: 1px; font-weight: 800; }
.sbox .val { font-size: 1.15rem; font-weight: 900; color: #fff; }

/* ── 서브타이틀 / 버튼 ── */
.sub {
  width: 100%; max-width: 420px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.sub p { font-size: 0.8rem; color: #776e65; }
.sub p strong { color: #e94560; }

#btnNew {
  background: #8f7a66; color: #f9f6f2;
  border: none; border-radius: 8px;
  padding: 9px 16px; font-size: 0.85rem; font-weight: 800;
  cursor: pointer; -webkit-appearance: none;
  touch-action: manipulation;
  transition: transform 0.1s;
}
#btnNew:active { transform: scale(0.94); }

/* ── 보드 ── */
#wrap {
  width: 100%; max-width: 420px;
  background: #bbada0; border-radius: 10px;
  padding: 10px; position: relative;
  touch-action: none; /* 스와이프 처리 */
}

#grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.cell {
  aspect-ratio: 1;
  background: rgba(238,228,218,0.38);
  border-radius: 6px;
  position: relative;
  overflow: hidden;
}

/* ── 타일 ── */
.tile {
  position: absolute; inset: 0;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; line-height: 1;
  animation: pop-in 0.12s ease-out;
}

@keyframes pop-in {
  from { transform: scale(0.5); opacity: 0.5; }
  to   { transform: scale(1);   opacity: 1; }
}
@keyframes merge-pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.18); }
  100% { transform: scale(1); }
}
.tile.merged { animation: merge-pop 0.16s ease; }

/* 타일 색상 */
.t2    { background:#eee4da; color:#776e65; }
.t4    { background:#ede0c8; color:#776e65; }
.t8    { background:#f2b179; color:#fff; }
.t16   { background:#f59563; color:#fff; }
.t32   { background:#f67c5f; color:#fff; }
.t64   { background:#f65e3b; color:#fff; }
.t128  { background:#edcf72; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.25); }
.t256  { background:#edcc61; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.25); }
.t512  { background:#edc850; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.25); }
.t1024 { background:#edc53f; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.25); }
.t2048 { background:#edc22e; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.3); }
.t-super { background:#3c3a32; color:#fff; }

/* ── 오버레이 ── */
#overlay {
  display: none; position: absolute; inset: 0;
  background: rgba(238,228,218,0.88);
  border-radius: 10px;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; z-index: 10;
}
#overlay.on { display: flex; }
#overlay h2 { font-size: 1.8rem; font-weight: 900; color: #776e65; }
#overlay p  { font-size: 0.9rem; color: #776e65; }
#overlay button {
  margin-top: 4px; padding: 10px 24px;
  background: #8f7a66; color: #fff;
  border: none; border-radius: 8px;
  font-size: 1rem; font-weight: 800; cursor: pointer;
  -webkit-appearance: none; touch-action: manipulation;
}

/* ── 힌트 ── */
.hint {
  margin-top: 12px; font-size: 0.78rem; color: #aaa;
  text-align: center; letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div class="header">
  <h1>2048</h1>
  <div class="score-area">
    <div class="sbox"><div class="lbl">점수</div><div class="val" id="score">0</div></div>
    <div class="sbox"><div class="lbl">최고</div><div class="val" id="best">0</div></div>
  </div>
</div>

<div class="sub">
  <p>✨ <strong>성유나</strong>의 2048 게임</p>
  <button id="btnNew" onclick="newGame()">새 게임</button>
</div>

<div id="wrap">
  <div id="grid"></div>
  <div id="overlay">
    <h2 id="ol-title"></h2>
    <p id="ol-msg"></p>
    <button onclick="overlayAction()">계속하기</button>
  </div>
</div>

<p class="hint">← → ↑ ↓ 스와이프해서 숫자를 합치세요!</p>

<script>
// ───────────── 상태 ─────────────
let board, score, bestScore, gameOver, wonShown;

bestScore = parseInt(localStorage.getItem('yuna2048best') || '0');
document.getElementById('best').textContent = bestScore;

const TSIZE = [
  [2,'t2',clamp(22,6)],[4,'t4',clamp(22,6)],[8,'t8',clamp(22,6)],
  [16,'t16',clamp(22,6)],[32,'t32',clamp(22,6)],[64,'t64',clamp(22,6)],
  [128,'t128',clamp(20,5.5)],[256,'t256',clamp(20,5.5)],
  [512,'t512',clamp(20,5.5)],[1024,'t1024',clamp(16,4.5)],
  [2048,'t2048',clamp(16,4.5)]
];
function clamp(px, vw) { return `clamp(${px*0.75}px, ${vw}vw, ${px}px)`; }

function tileStyle(val) {
  for (const [v,cls,fs] of TSIZE) if (val===v) return {cls,fs};
  return { cls:'t-super', fs: clamp(13,3.5) };
}

// ───────────── 게임 로직 ─────────────
function newGame() {
  board = Array.from({length:4}, ()=>Array(4).fill(0));
  score = 0; gameOver = false; wonShown = false;
  document.getElementById('overlay').classList.remove('on');
  addTile(); addTile();
  render();
}

function addTile() {
  const empty = [];
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (!board[r][c]) empty.push([r,c]);
  if (!empty.length) return false;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random()<0.9 ? 2 : 4;
  return true;
}

function slideRow(row) {
  const f = row.filter(x=>x);
  let res=[], added=0;
  for (let i=0;i<f.length;i++) {
    if (i+1<f.length && f[i]===f[i+1]) {
      const v=f[i]*2; res.push(v); added+=v; i++;
    } else res.push(f[i]);
  }
  while (res.length<4) res.push(0);
  return {res, added};
}

function move(dir) {
  if (gameOver) return false;
  const nb = board.map(r=>[...r]);
  let totalAdded=0, moved=false;

  if (dir==='left'||dir==='right') {
    for (let r=0;r<4;r++) {
      const row = dir==='right' ? [...nb[r]].reverse() : nb[r];
      const {res,added} = slideRow(row);
      const back = dir==='right' ? [...res].reverse() : res;
      if (back.join()!==nb[r].join()) moved=true;
      nb[r]=back; totalAdded+=added;
    }
  } else {
    for (let c=0;c<4;c++) {
      const col = nb.map(r=>r[c]);
      const arr = dir==='down' ? [...col].reverse() : col;
      const {res,added} = slideRow(arr);
      const back = dir==='down' ? [...res].reverse() : res;
      const orig = nb.map(r=>r[c]);
      if (back.join()!==orig.join()) moved=true;
      for (let r=0;r<4;r++) nb[r][c]=back[r];
      totalAdded+=added;
    }
  }

  if (!moved) return false;
  board=nb; score+=totalAdded;
  if (score>bestScore) { bestScore=score; localStorage.setItem('yuna2048best',bestScore); }

  addTile();

  // 2048 달성
  if (!wonShown && board.some(r=>r.some(v=>v===2048))) {
    wonShown=true;
    showOverlay('🎉 2048 달성!','성유나 최고! 계속할 수 있어요','계속하기');
  }

  // 게임오버
  if (!canMove()) {
    gameOver=true;
    showOverlay('게임 오버 😢',`최종 점수: ${score}`,'다시 시작');
  }

  render(); return true;
}

function canMove() {
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    if (!board[r][c]) return true;
    if (c<3&&board[r][c]===board[r][c+1]) return true;
    if (r<3&&board[r][c]===board[r+1][c]) return true;
  }
  return false;
}

function showOverlay(title, msg, btn) {
  document.getElementById('ol-title').textContent=title;
  document.getElementById('ol-msg').textContent=msg;
  document.querySelector('#overlay button').textContent=btn;
  document.getElementById('overlay').classList.add('on');
}

function overlayAction() {
  if (gameOver) newGame();
  else document.getElementById('overlay').classList.remove('on');
}

// ───────────── 렌더링 ─────────────
function render() {
  const grid = document.getElementById('grid');
  const oldCells = grid.querySelectorAll('.cell');

  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    const idx=r*4+c;
    const cell = oldCells[idx] || (() => {
      const d=document.createElement('div'); d.className='cell'; grid.appendChild(d); return d;
    })();

    const val=board[r][c];
    const existing=cell.querySelector('.tile');

    if (!val) { cell.innerHTML=''; continue; }

    const {cls,fs}=tileStyle(val);
    const existingVal = existing ? parseInt(existing.dataset.val) : 0;

    if (!existing || existingVal!==val) {
      const tile=document.createElement('div');
      tile.className='tile '+cls;
      if (existing && existingVal!==val && existingVal!==0) tile.classList.add('merged');
      tile.dataset.val=val;
      tile.style.fontSize=fs;
      tile.textContent=val;
      cell.innerHTML='';
      cell.appendChild(tile);
    }
  }

  // 초기 cell 생성
  while (grid.children.length<16) {
    const d=document.createElement('div'); d.className='cell'; grid.appendChild(d);
  }

  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=bestScore;
}

// ───────────── 초기화 (grid 생성) ─────────────
(function initGrid() {
  const grid=document.getElementById('grid');
  for (let i=0;i<16;i++) { const d=document.createElement('div'); d.className='cell'; grid.appendChild(d); }
})();

// ───────────── 터치 스와이프 ─────────────
let tx0=0, ty0=0;
const wrap=document.getElementById('wrap');

wrap.addEventListener('touchstart', e=>{
  tx0=e.touches[0].clientX; ty0=e.touches[0].clientY;
}, {passive:true});

wrap.addEventListener('touchmove', e=>{ e.preventDefault(); }, {passive:false});

wrap.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx0;
  const dy=e.changedTouches[0].clientY-ty0;
  const ax=Math.abs(dx), ay=Math.abs(dy);
  if (Math.max(ax,ay)<25) return;
  move(ax>ay ? (dx>0?'right':'left') : (dy>0?'down':'up'));
}, {passive:true});

// ───────────── 키보드 (PC 테스트용) ─────────────
document.addEventListener('keydown', e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// ───────────── 시작 ─────────────
newGame();
</script>
</body>
</html>
